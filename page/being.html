<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fantasy Wiki — Being</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <header class="zone-header">
    <nav id="zone-nav" aria-label="Being categories"></nav>
  </header>

  <main class="page-wrap">
    <section class="article">
      <h1 id="being-title">Loading…</h1>
      <div class="divider"></div>

      <p id="being-intro" class="intro"></p>

      <section class="contents-box">
        <h2>Contents</h2>
        <ol>
          <li>History</li>
          <li>Culture</li>
          <li>Gallery</li>
          <li>References</li>
        </ol>
      </section>
    </section>

    <aside class="infobox" aria-label="Being information">
      <div class="infobox-title" id="infobox-title">Being</div>
      <div class="infobox-image-placeholder" id="being-image-wrap">Image</div>
      <dl class="infobox-list">
        <div class="info-row">
          <dt>Type</dt>
          <dd id="being-category">—</dd>
        </div>
        <div class="info-row">
          <dt>Race</dt>
          <dd id="being-race">—</dd>
        </div>
        <div class="info-row">
          <dt>Subraces</dt>
          <dd id="being-subraces">—</dd>
        </div>
      </dl>
    </aside>
  </main>

  <script type="module" src="../main.js"></script>
</body>
</html>
