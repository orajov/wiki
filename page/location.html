<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fantasy Wiki - Location</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <header class="zone-header">
    <nav id="zone-nav" aria-label="Zone navigation"></nav>
  </header>

  <main class="page-wrap">
    <section class="article">
      <h1 id="location-title">Loading...</h1>
      <div class="divider"></div>

      <p id="location-intro" class="intro"></p>

      <section class="contents-box">
        <h2>Contents</h2>
        <ol>
          <li>History</li>
          <li>Quests</li>
          <li>Gallery</li>
          <li>References</li>
        </ol>
      </section>
    </section>

    <aside class="infobox" aria-label="Location information">
      <div class="infobox-title" id="infobox-title">Location</div>
      <div class="infobox-image-placeholder">Image</div>
      <dl class="infobox-list">
        <div class="info-row">
          <dt>Type</dt>
          <dd>Location</dd>
        </div>
        <div class="info-row">
          <dt>Located</dt>
          <dd id="located-chain">-</dd>
        </div>
        <div class="info-row">
          <dt>Status</dt>
          <dd>Active</dd>
        </div>
      </dl>
    </aside>
  </main>

  <script type="module" src="../main.js"></script>
</body>
</html>
